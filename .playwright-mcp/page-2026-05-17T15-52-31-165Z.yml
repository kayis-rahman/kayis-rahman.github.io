  - generic [ref=e43]:
    - paragraph [ref=e44]: I’m a Staff Security Software Engineer at Qualcomm in Cork, Ireland, specialising in PKI, HSM, and secure device provisioning. I’ve been building software professionally since August 2015 — over 10 years across enterprise backend, cloud infrastructure, and now cryptographic security.
    - paragraph [ref=e45]: My core expertise is in Java and Spring Boot. I’ve architected microservices platforms, led cloud migrations, and built full-stack systems with Angular and GraphQL. Alongside Java, I’m proficient in Go, JavaScript, and have hands-on experience across AWS, GCP, and Azure with Docker, Kubernetes, Terraform, and CI/CD automation.
    - paragraph [ref=e46]: Before Qualcomm, I was Senior Technical Lead at Ernst & Young GDS, where I led engineering teams through cloud-native transformations and mentored junior developers. I hold an MSc in Information Systems with Computing from Dublin Business School.
    - paragraph [ref=e47]: When I’m not working, I build things. I’ve developed an automated swing trading system in Java/Spring Boot with TimescaleDB and LangChain4j running a local LLM. I also run a self-hosted LLM inference setup — vLLM serving Qwen3 on dual RTX 4090s — for experimentation and prototyping.
    - paragraph [ref=e48]: Based near Cork, Ireland.
