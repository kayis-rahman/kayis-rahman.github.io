{% if site.google_analytics and jekyll.environment == 'production' %}
<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', '{{ site.google_analytics }}');
  if (document.cookie.split(';').some(function(c) { return c.trim() === 'ga_internal=true'; })) {
    gtag('set', 'custom_params', { traffic_type: 'internal' });
  }
</script>
{% endif %}

<!-- Page transition animation on all internal link clicks -->
<script>
$(document).on('click', 'a[href]', function (e) {
  var href = $(this).attr('href');
  if (
    !href ||
    href.charAt(0) === '#' ||
    href.indexOf('mailto:') === 0 ||
    href.indexOf('tel:') === 0 ||
    href.indexOf('javascript:') === 0 ||
    href.indexOf('://') !== -1
  ) return;
  e.preventDefault();
  var url = href;
  $('body').addClass('exiting');
  setTimeout(function () { window.location.href = url; }, 200);
});

// Masthead background-image load detection
(function () {
  var $masthead = $('header.masthead');
  if (!$masthead.length) return;
  var bg = $masthead.css('background-image');
  var match = bg && bg.match(/url\(["']?([^"')]+)["']?\)/);
  if (match) {
    var img = new Image();
    img.onload = function () { $masthead.addClass('masthead-loaded'); };
    img.onerror = function () { $masthead.addClass('masthead-loaded'); }; // show even on error
    img.src = match[1];
  } else {
    $masthead.addClass('masthead-loaded');
  }
}());
</script>
