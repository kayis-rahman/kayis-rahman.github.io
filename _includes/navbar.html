<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light fixed-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="{{"/" | relative_url }}">{{ site.title | escape }}</a>
    <button class="navbar-toggler navbar-toggler-right" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
      Menu
      <i class="fa fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item{% if page.url == '/' %} active{% endif %}">
          <a class="nav-link" href="{{"/" | relative_url }}">Home</a>
        </li>
        <li class="nav-item{% if page.url contains '/about' %} active{% endif %}">
          <a class="nav-link" href="{{"/about" | relative_url }}">About</a>
        </li>
        <li class="nav-item{% if page.url contains '/posts' or page.layout == 'post' %} active{% endif %}">
          <a class="nav-link" href="{{"/posts" | relative_url }}">Blog</a>
        </li>
        <li class="nav-item{% if page.url contains '/resume' %} active{% endif %}">
          <a class="nav-link" href="{{ "/resume" | relative_url }}">Resume</a>
        </li>
        <li class="nav-item{% if page.url contains '/contact' %} active{% endif %}">
          <a class="nav-link" href="{{"/contact" | relative_url }}">Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-link rss-link" href="{{ "/feed.xml" | relative_url }}" title="RSS Feed" aria-label="RSS Feed">
            <i class="fas fa-rss"></i>
          </a>
        </li>
        <li class="nav-item">
          <button id="theme-toggle" aria-label="Toggle dark mode">
            <i id="theme-icon" class="fas fa-moon"></i>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>
