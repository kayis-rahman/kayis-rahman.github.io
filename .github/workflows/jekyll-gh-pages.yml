name: Build, minify, and deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Ruby with gem cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js with cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install build tools
        run: npm install

      - name: Build with Jekyll
        run: bundle exec jekyll build --destination ./_site

      - name: Minify HTML
        run: |
          mkdir -p ./_minified
          npx html-minifier-terser \
            --input-dir ./_site \
            --output-dir ./_minified \
            --file-ext html \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js true
          # Copy ALL non-HTML files first (img/, assets/, manifest.json, etc.)
          rsync -a --exclude="*.html" ./_site/ ./_minified/

      - name: Minify JavaScript
        run: |
          npx terser ./_minified/assets/scripts.js \
            --compress --mangle \
            --output ./_minified/assets/scripts.js.min
          npx terser ./_minified/sw.js \
            --compress --mangle \
            --output ./_minified/sw.js.min 2>/dev/null || true

      - name: Check if images changed
        id: image-changes
        continue-on-error: true
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q 'assets/img/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Optimize images
        if: steps.image-changes.outputs.changed == 'true'
        run: |
          node << 'EOF'
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');

          function findImages(dir) {
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...findImages(full));
              } else if (/\.(jpg|jpeg|png)$/i.test(entry.name)) {
                results.push(full);
              }
            }
            return results;
          }

          const files = findImages('./_minified/assets/img');
          Promise.all(files.map(async (f) => {
            const tmp = f + '.opt';
            if (/\.(jpg|jpeg)$/i.test(f)) {
              await sharp(f).jpeg({ quality: 80, mozjpeg: true }).toFile(tmp);
            } else {
              await sharp(f).png({ quality: 80, compressionLevel: 9, palette: true }).toFile(tmp);
            }
            fs.renameSync(tmp, f);
            console.log('Optimized:', f);
          })).then(() => console.log(`Done. Compressed ${files.length} images.`));
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_minified

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
