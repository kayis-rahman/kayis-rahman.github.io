name: Build, minify, and deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Minify HTML
        run: |
          mkdir -p ./_minified
          npx --yes html-minifier-terser \
            --input-dir ./_site \
            --output-dir ./_minified \
            --file-ext html \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js true
          # Copy ALL non-HTML files first (img/, assets/, manifest.json, etc.)
          rsync -a --exclude="*.html" ./_site/ ./_minified/

      - name: Minify JavaScript
        run: |
          npx --yes terser ./_minified/assets/scripts.js \
            --compress --mangle \
            --output ./_minified/assets/scripts.js.min
          npx --yes terser ./_minified/sw.js \
            --compress --mangle \
            --output ./_minified/sw.js.min 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_minified

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
