---
layout: page
title: Search
permalink: /search/
background: '/img/home.jpg'
---

<div class="search-container">
  <div class="input-group mb-4">
    <input type="text" id="search-input" class="form-control search-input"
           placeholder="Search posts…" autocomplete="off" autofocus>
    <div class="input-group-append">
      <span class="input-group-text"><i class="fas fa-search"></i></span>
    </div>
  </div>
  <div id="search-hint" class="text-muted small mb-3">Type to search across all posts.</div>
  <div id="search-results"></div>
</div>

<script src="https://unpkg.com/lunr@2.3.9/lunr.js" integrity="sha384-bKKLJnLcJONf72nRSHI5d7FJ0xpuiJvpqVYyHWqvHcBtfG28U9VqDZEPqLJdnFdx" crossorigin="anonymous"></script>
<script>
(function () {
  fetch('{{ "/search.json" | relative_url }}')
    .then(function (r) { return r.json(); })
    .then(function (posts) {
      var idx = lunr(function () {
        this.ref('id');
        this.field('title', { boost: 10 });
        this.field('tags',  { boost: 5  });
        this.field('excerpt');
        posts.forEach(function (p) { this.add(p); }, this);
      });

      var byId = {};
      posts.forEach(function (p) { byId[p.id] = p; });

      var input   = document.getElementById('search-input');
      var results = document.getElementById('search-results');
      var hint    = document.getElementById('search-hint');

      input.addEventListener('input', function () {
        var q = input.value.trim();
        results.innerHTML = '';
        if (!q) { hint.style.display = ''; return; }
        hint.style.display = 'none';

        var hits;
        try { hits = idx.search(q + '~1'); } catch (e) { hits = []; }

        if (!hits.length) {
          var noResults = document.createElement('p');
          noResults.className = 'text-muted';
          var noResultsText = document.createTextNode('No posts found for ');
          var strong = document.createElement('strong');
          strong.textContent = q;
          noResults.appendChild(noResultsText);
          noResults.appendChild(strong);
          noResults.appendChild(document.createTextNode('.'));
          results.appendChild(noResults);
          return;
        }
        hits.forEach(function (hit) {
          var p = byId[hit.ref];
          if (!p) return;
          var article = document.createElement('article');
          article.className = 'search-result';

          var h4 = document.createElement('h4');
          var link = document.createElement('a');
          link.setAttribute('href', p.url);
          link.textContent = p.title;
          h4.appendChild(link);
          article.appendChild(h4);

          var meta = document.createElement('p');
          meta.className = 'post-meta';
          meta.textContent = p.date + (p.tags ? ' · ' + p.tags : '');
          article.appendChild(meta);

          var excerpt = document.createElement('p');
          excerpt.textContent = p.excerpt;
          article.appendChild(excerpt);

          results.appendChild(article);

          var hr = document.createElement('hr');
          results.appendChild(hr);
        });
      });
    });
})();
</script>
