---
layout: default
---

<!-- Posts data generated by Liquid (filter out remote theme sample posts) -->
<textarea id="posts-data">{% for post in site.posts %}{% unless post.url contains '/private/' %}{"title":{{ post.title | jsonify }},"date":{{ post.date | date: "%Y-%m-%d" | jsonify }},"url":{{ post.url | jsonify }},"tags":[{% for tag in post.tags %}"{{ tag }}"{% if forloop.last %}{% else %},{% endif %}{% endfor %} ],"excerpt":{{ post.excerpt | strip_html | truncatewords: 30 | jsonify }}} {% endunless %}{% endfor %}</textarea>

<div class="terminal-container" id="terminal-container">
  <div class="terminal-header">
    <div class="terminal-buttons">
      <span class="terminal-btn close"></span>
      <span class="terminal-btn minimize"></span>
      <span class="terminal-btn maximize"></span>
    </div>
    <div class="terminal-title">kayisrahman ~ ~</div>
  </div>
  <div class="terminal-body" id="terminal-body">
    <div class="terminal-output" id="terminal-output">
      <div id="terminal-boot" class="terminal-line"></div>
    </div>
    <div class="terminal-input-line">
      <span class="terminal-prompt" id="terminal-prompt">kayisrahman@home ~ $</span>
      <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false" />
    </div>
  </div>
</div>

{% raw %}
<script>
(function() {
  const commands = {
    help: { desc: 'Show available commands', usage: 'help' },
    ls:   { desc: 'List contents of current directory', usage: 'ls' },
    cat:  { desc: 'Read a file', usage: 'cat <file>' },
    cd:   { desc: 'Change directory', usage: 'cd <dir>' },
    pwd:  { desc: 'Print working directory', usage: 'pwd' },
    whoami: { desc: 'Who are you?', usage: 'whoami' },
    visit: { desc: 'Open a page in the browser', usage: 'visit <page>' },
    clear:{ desc: 'Clear the terminal', usage: 'clear' },
    history: { desc: 'Show command history', usage: 'history' },
    about: { desc: 'Read about me', usage: 'about' },
    skills: { desc: 'View my skills', usage: 'skills' },
    projects: { desc: 'View my projects', usage: 'projects' },
    contact: { desc: 'Get my contact info', usage: 'contact' },
    github: { desc: 'Open my GitHub profile', usage: 'github' },
    linkedin: { desc: 'Open my LinkedIn profile', usage: 'linkedin' },
    twitter: { desc: 'Open my X/Twitter profile', usage: 'twitter' },
    sudo: { desc: '...', usage: 'sudo' }
  };

  // Load posts data from JSON
  let postsList = [];
  try {
    const postsEl = document.getElementById('posts-data');
    if (postsEl) {
      let raw = postsEl.value.trim();
      // Remove trailing comma if present
      if (raw.endsWith(',')) raw = raw.slice(0, -1);
      if (raw) postsList = JSON.parse('[' + raw + ']');
    }
  } catch(e) { /* empty */ }

  // Build posts directory from data
  const postsDir = { type: 'dir', children: {} };
  postsList.forEach(function(post) {
    const name = post.url.replace(/\//g, '').replace('.html', '') + '.md';
    const tagsLine = post.tags.length ? '  Tags: ' + post.tags.join(', ') + ',' : '';
    postsDir.children[name] = {
      type: 'file',
      content: '> ' + post.title + '\n  Date: ' + post.date + '\n' +
               tagsLine + '\n\n' +
               post.excerpt + '\n\n' +
               'Read full post: visit' + post.url
    };
  });

  // Virtual filesystem
  const vfs = {
    type: 'dir',
    children: {
      'README.md': {
        type: 'file',
        content: [
          'Welcome to Kayis Rahman\'s portfolio.',
          '',
          'This is an interactive terminal. Type "help" to see available commands.',
          'Type "ls" to explore the file system.',
          '',
          'All blog posts, projects, and info are accessible via commands.',
          'Nothing here is a real shell — it\'s a map to the site.',
          ''
        ].join('\n')
      },
      'about.md': {
        type: 'file',
        content: [
          '> About Me',
          '',
          'Staff Security Engineer at Qualcomm.',
          'Specializing in PKI, HSM, and secure device provisioning.',
          '10+ years of backend engineering experience.',
          '',
          'Based in Cork, Ireland.',
          '',
          'On the side: building automated trading systems and LLM inference infrastructure.',
          '',
          'For more detail, try: cat resume.md',
          ''
        ].join('\n')
      },
      'resume.md': {
        type: 'file',
        content: [
          '> Resume',
          '',
          'For my full resume, visit: /resume/',
          '',
          'Quick summary:',
          '- Staff Security Engineer at Qualcomm',
          '- PKI / Certificate Lifecycle Management',
          '- HSM Integration (Thales, Utimaco)',
          '- Java, Go, Python',
          '- Secure Boot, Device Provisioning',
          '- Automated Trading Systems (side project)',
          '- LLM Inference Infrastructure (side project)',
          '',
          'Try: visit /resume/'
          ''
        ].join('\n')
      },
      'skills.md': {
        type: 'file',
        content: [
          '> Skills',
          '',
          'Languages:    Java, Go, Python, JavaScript, Swift',
          'Security:     PKI, HSM, TLS/X.509, OAuth2/OIDC, mTLS',
          'Infrastructure: Kubernetes, Docker, AWS, GCP',
          'Databases:    PostgreSQL, MongoDB, Redis',
          'Platforms:    Android, iOS, Linux, Embedded',
          'Tools:       Git, Jenkins, Terraform, Ansible',
          '',
          'Currently exploring: LLM serving, automated trading',
          ''
        ].join('\n')
      },
      'contact.md': {
        type: 'file',
        content: [
          '> Contact',
          '',
          'Email:    kaisbk1@gmail.com',
          'GitHub:   github.com/kayisrahman',
          'LinkedIn: linkedin.com/in/kayisrahman',
          'X/Twitter: @kayisrahman',
          'Location: Cork, Ireland',
          '',
          'Try: github  (opens profile in new tab)',
          ''
        ].join('\n')
      },
      'posts': postsDir,
      'projects': {
        type: 'dir',
        children: {
          'time-beam.md': {
            type: 'file',
            content: '> TimeBeam\n  Cross-device synchronized timer.\n  macOS + iOS + Node.js backend.\n  \n  Real-time timer sync across devices via WebSocket.\n  Built with SwiftUI and native macOS app kit.'
          },
          'swing-trader.md': {
            type: 'file',
            content: '> Automated Swing Trading System\n  AI-assisted swing trading.\n  Technical analysis + LLM-based reasoning.\n  \n  Researches charts, generates trade theses,\n  and tracks performance with eval frameworks.'
          },
          'fin-app.md': {
            type: 'file',
            content: '> FinApp\n  Personal finance dashboard.\n  Vue 3 + TypeScript frontend.\n  Express + PostgreSQL backend.\n  \n  Expense tracking, budgeting, and financial insights.'
          }
        }
      }
    }
  };

  let cwd = { path: '~', node: vfs };
  let history = [];
  let historyIndex = -1;

  const terminalBody = document.getElementById('terminal-body');
  const terminalOutput = document.getElementById('terminal-output');
  const terminalInput = document.getElementById('terminal-input');
  const terminalPrompt = document.getElementById('terminal-prompt');
  const bootEl = document.getElementById('terminal-boot');

  // Boot sequence
  const bootText = [
    'Welcome to kayisrahman-portfolio v1.0',
    'Type "help" for available commands.',
    ''
  ].join('\n');
  bootEl.textContent = bootText;

  // Update prompt
  function updatePrompt() {
    terminalPrompt.textContent = "kayisrahman@" + cwd.path + ' $';
  }

  // Print output
  function printOutput(text, className) {
    const div = document.createElement('div');
    div.className = 'terminal-line' + (className ? ' ' + className : '');
    div.textContent = text;
    terminalOutput.appendChild(div);
    terminalOutput.scrollTop = terminalOutput.scrollHeight;
  }

  // Execute command
  function executeCommand(input) {
    const trimmed = input.trim();
    if (!trimmed) return;

    history.push(trimmed);
    historyIndex = history.length;

    // Print the command
    printOutput(terminalPrompt.textContent + ' ' + trimmed, 'terminal-command');

    const parts = trimmed.split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);

    switch (cmd) {
      case 'help':
        printOutput([
          'Available commands:',
          ''
        ].join('\n') + Object.entries(commands).map(function(entry) {
          return '  ' + entry[0].padEnd(12) + ' ' + entry[1].desc;
        }).join('\n'));
        break;

      case 'ls': {
        const node = cwd.node;
        if (node.type === 'file') {
          printOutput('ls: not a directory');
        } else {
          const entries = Object.keys(node.children || {});
          if (entries.length === 0) {
            printOutput('(empty directory)');
          } else {
            const output = entries.map(function(name) {
              const child = node.children[name];
              return child.type === 'dir' ? name + '/' : name;
            }).join('  ');
            printOutput(output);
          }
        }
        break;
      }

      case 'cat': {
        if (!args[0]) {
          printOutput('Usage: cat <file>');
          return;
        }
        const name = args[0];
        const node = cwd.node;
        if (node.type !== 'dir' || !node.children[name]) {
          printOutput('cat: ' + name + ': No such file');
          return;
        }
        const target = node.children[name];
        if (target.type === 'dir') {
          printOutput('cat: ' + name + ': Is a directory');
          return;
        }
        printOutput(target.content);
        break;
      }

      case 'cd': {
        if (!args[0] || args[0] === '~') {
          cwd = { path: '~', node: vfs };
          updatePrompt();
          return;
        }
        if (args[0] === '..') {
          printOutput('You are at the root. Nowhere to go back.');
          return;
        }
        const cdName = args[0];
        const cdNode = cwd.node;
        if (cdNode.type !== 'dir' || !cdNode.children[cdName]) {
          printOutput('cd: ' + cdName + ': No such directory');
          return;
        }
        const cdTarget = cdNode.children[cdName];
        if (cdTarget.type !== 'dir') {
          printOutput('cd: ' + cdName + ': Not a directory');
          return;
        }
        cwd = { path: cdName, node: cdTarget };
        updatePrompt();
        break;
      }

      case 'pwd':
        printOutput('/home/kayisrahman/' + (cwd.path === '~' ? '' : cwd.path));
        break;

      case 'whoami':
        printOutput('visitor');
        break;

      case 'about':
        printOutput(vfs.children['about.md'].content);
        break;

      case 'skills':
        printOutput(vfs.children['skills.md'].content);
        break;

      case 'projects':
        printOutput('Try: cd projects && ls');
        break;

      case 'contact':
        printOutput(vfs.children['contact.md'].content);
        break;

      case 'visit': {
        if (!args[0]) {
          printOutput('Usage: visit <page>');
          return;
        }
        let url = args[0];
        if (!url.startsWith('http') && !url.startsWith('/'))
          url = '/' + url;
        window.open(url, '_blank');
        printOutput('Opening: ' + args[0]);
        break;
      }

      case 'github':
        window.open('https://github.com/kayisrahman', '_blank');
        printOutput('Opening GitHub profile...');
        break;

      case 'linkedin':
        window.open('https://linkedin.com/in/kayisrahman', '_blank');
        printOutput('Opening LinkedIn profile...');
        break;

      case 'twitter':
        window.open('https://x.com/kayisrahman', '_blank');
        printOutput('Opening X/Twitter profile...');
        break;

      case 'clear':
        while (terminalOutput.children.length > 1) {
          terminalOutput.removeChild(terminalOutput.lastChild);
        }
        return;

      case 'history':
        printOutput(history.map(function(h, i) {
          return '  ' + (i + 1) + '  ' + h;
        }).join('\n') || '(no history)');
        break;

      case 'sudo':
        printOutput('Nice try. This is a portfolio, not your production server. ;)');
        break;

      default:
        printOutput(cmd + ': command not found. Type "help" for available commands.');
    }
  }

  // Input handler
  terminalInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      executeCommand(this.value);
      this.value = '';
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        this.value = history[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex < history.length - 1) {
        historyIndex++;
        this.value = history[historyIndex];
      } else {
        historyIndex = history.length;
        this.value = '';
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const partial = this.value.toLowerCase();
      const matches = Object.keys(commands).filter(function(c) {
        return c.startsWith(partial);
      });
      if (matches.length === 1) {
        this.value = matches[0];
      } else if (matches.length > 1) {
        printOutput(terminalPrompt.textContent + ' ' + partial, 'terminal-command');
        printOutput(matches.join('  '));
      }
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      while (terminalOutput.children.length > 1) {
        terminalOutput.removeChild(terminalOutput.lastChild);
      }
    }
  });

  // Click to focus input
  terminalBody.addEventListener('click', function(e) {
    if (e.target !== terminalInput) {
      terminalInput.focus();
    }
  });

  // Keep focus on input
  document.addEventListener('keydown', function(e) {
    if (document.activeElement !== terminalInput && !e.ctrlKey && !e.altKey && e.key.length === 1) {
      terminalInput.focus();
    }
  });

  // Focus input on load
  terminalInput.focus();
})();
</script>
{% endraw %}
