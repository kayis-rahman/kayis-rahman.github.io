# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Kayis Rahman
email: kaisbk1@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Staff Security Engineer | PKI/HSM | Java & Go
subheading: "Building automated trading systems and LLM inference infrastructure on the side."
seo_description: "Staff Security Engineer specialising in PKI, HSM, and secure device provisioning. 10+ years of backend engineering experience. Based in Cork, Ireland."
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://kayis-rahman.github.io" # the base hostname & protocol for your site, e.g. http://example.com
author: Kayis Rahman
author_bio: "Staff Security Engineer at Qualcomm. I write about PKI, Java, LLM inference, and building things on the side."
twitter_username: kayisrahman
github_username: kayisrahman
linkedin_username: kayisrahman
google_analytics: G-5TTZSZQHPY
disable_disk_cache: false
future: true

# Newsletter — sign up at buttondown.email then set your username to show the signup form
newsletter_username: kayis

# Google Analytics 4 — add your Measurement ID to enable
# google_analytics: G-XXXXXXXXXX

navigation:
  - title: "Home"
    url: "/"
  - title: "Resume"
    url: "/resume/"
  - title: "Blog"
    url: "/posts/"

# Build settings
sass:
  style: compressed
remote_theme: StartBootstrap/startbootstrap-clean-blog-jekyll
plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-sitemap


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lockme
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - CLAUDE.md
  - private/
  - .idea/
  - .DS_Store
  - .playwright-mcp/
